# 角色连接配置
# 文件名即为角色标识，建议用角色名命名

# 连接信息
name = "角色名"
host = "ln.xkxmud.com"
port = 5555
encoding = "gbk"

# Lua 脚本路径（相对于程序运行目录）
script = "scripts/example.lua"

# 连接行为
auto_connect = true
auto_reconnect = true
reconnect_delay_secs = 5

# 登录凭证（启动时自动注入 Lua 变量 char_name / char_password）
# 留空则不注入，需手动输入或通过 Lua 脚本 setname/setpwd 设置
username = "your_character_name"
password = "your_password"

# SOCKS5 代理（可选，不设置则直连）
socks5_enable = false
socks5_host = "127.0.0.1"
socks5_port = 1080
socks5_username = ""
socks5_password = ""

# 日志文件保留数量（可选，默认 24，即保留最近 24 个小时的日志文件）
# log_rotation_count = 168
