name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - arch: x86_64
            target: x86_64-unknown-linux-gnu
          - arch: i686
            target: i686-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install 32-bit dependencies
        if: matrix.arch == 'i686'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y gcc-multilib g++-multilib

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/RustLuaMud release/
          tar czf release/RustLuaMud-linux-${{ matrix.arch }}.tar.gz -C release RustLuaMud

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-lua-mud-${{ matrix.arch }}
          path: release/RustLuaMud-linux-${{ matrix.arch }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          # 获取上一个 tag 到当前 tag 的提交记录
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s" --reverse)
          else
            LOG=$(git log --pretty=format:"- %s" --reverse ${PREV_TAG}..HEAD)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.changelog.outputs.tag }}
          body: |
            ## Changes
            ${{ steps.changelog.outputs.changelog }}
          files: |
            release/RustLuaMud-linux-x86_64.tar.gz
            release/RustLuaMud-linux-i686.tar.gz

      - name: Sync to Gitee Release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_CI }}
        run: |
          set -e
          OWNER="bai-yifei180"
          REPO="RustLuaMud"
          TAG="${{ steps.changelog.outputs.tag }}"
          AUTH="access_token=${GITEE_TOKEN}"
          BASE="https://gitee.com/api/v5/repos/${OWNER}/${REPO}"

          # 获取或创建 Release
          echo "==> Checking existing release on Gitee..."
          RESP=$(curl -sS "${BASE}/releases/tags/${TAG}?${AUTH}")
          RELEASE_ID=$(echo "$RESP" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              print(d.get('id', ''))
          except:
              print('')
          " 2>/dev/null || echo "")

          if [ -z "$RELEASE_ID" ]; then
            echo "==> Creating Gitee Release (tag: ${TAG})..."
            CHANGELOG="${{ steps.changelog.outputs.changelog }}"
            PAYLOAD=$(python3 -c "
          import json
          payload = {
              'tag_name': '${TAG}',
              'target_commitish': 'main',
              'name': 'Release ${TAG}',
              'body': '''## Changes
          ${CHANGELOG}''',
              'prerelease': False,
          }
          print(json.dumps(payload))
          ")
            RESP=$(curl -sS -X POST -H "Content-Type: application/json" \
              -d "${PAYLOAD}" \
              "${BASE}/releases?${AUTH}")
            echo "   API response: $(echo "$RESP" | head -c 300)"
            RELEASE_ID=$(echo "$RESP" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              print(d.get('id', ''))
          except:
              print('')
          " 2>/dev/null || echo "")
            echo "   Created release ID: ${RELEASE_ID}"
          else
            echo "==> Found existing Gitee Release (ID: ${RELEASE_ID})"
          fi

          if [ -n "$RELEASE_ID" ]; then
            echo "==> Uploading artifacts to Gitee Release..."
            for FILE in release/*.tar.gz; do
              echo "   Uploading: $FILE"
              UPLOAD_RESP=$(curl -sS -X POST \
                -F "file=@${FILE}" \
                "${BASE}/releases/${RELEASE_ID}/attach_files?${AUTH}")
              echo "   Upload response: $(echo "$UPLOAD_RESP" | head -c 300)"
            done
            echo "==> Gitee Release sync complete."
          else
            echo "!! Failed to get or create Gitee Release"
            exit 1
          fi
