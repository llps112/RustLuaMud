coverage:
  status:
    project:
      default:
        target: 60%
        threshold: 1%
        if_ci_failed: error
    patch:
      default:
        target: 80%
        threshold: 5%
        if_ci_failed: error

component_management:
  individual_components:
    - component_id: command_parsing
      name: Command Parsing
      paths:
        - src/app.rs
      statuses:
        - type: project
          target: 75%
          threshold: 2%
    - component_id: lua_engine
      name: Lua Engine Core
      paths:
        - src/lua/**
      statuses:
        - type: project
          target: 75%
          threshold: 2%

comment:
  layout: "header, diff, components, files"
  behavior: default
  require_changes: false

github_checks:
  annotations: true
