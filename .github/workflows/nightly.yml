name: Nightly Build

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (x86_64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Package binary
        run: |
          mkdir -p release
          cp target/release/RustLuaMud release/
          tar czf release/RustLuaMud-linux-x86_64.tar.gz -C release RustLuaMud

      - name: Upload to Nightly Release (GitHub)
        uses: ncipollo/release-action@v1
        with:
          tag: nightly
          name: Nightly Build
          body: "自动构建于 main 分支最新提交。\n\n```\ncurl -L https://github.com/llps112/RustLuaMud/releases/download/nightly/RustLuaMud-linux-x86_64.tar.gz | tar xz\n```"
          prerelease: true
          allowUpdates: true
          replacesArtifacts: true
          artifacts: "release/RustLuaMud-linux-x86_64.tar.gz"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync to Gitee Release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_CI }}
        run: |
          set -e
          OWNER="bai-yifei180"
          REPO="RustLuaMud"
          TAG="nightly"
          FILE="release/RustLuaMud-linux-x86_64.tar.gz"
          AUTH="access_token=${GITEE_TOKEN}"
          BASE="https://gitee.com/api/v5/repos/${OWNER}/${REPO}"

          # 获取或创建 Release
          echo "==> Checking existing release..."
          RESP=$(curl -sS "${BASE}/releases/tags/${TAG}?${AUTH}")
          RELEASE_ID=$(echo "$RESP" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              print(d.get('id', ''))
          except:
              print('')
          " 2>/dev/null || echo "")

          if [ -z "$RELEASE_ID" ]; then
            echo "==> Creating Gitee Release (tag: ${TAG})..."
            PAYLOAD=$(python3 -c "
          import json
          payload = {
              'tag_name': '${TAG}',
              'target_commitish': 'main',
              'name': 'Nightly Build',
              'body': '自动构建于 main 分支最新提交。\n\n下载地址：\n\`\`\`\ncurl -L https://gitee.com/${OWNER}/${REPO}/releases/download/${TAG}/RustLuaMud-linux-x86_64.tar.gz | tar xz\n\`\`\`',
              'prerelease': True,
          }
          print(json.dumps(payload))
          ")
            RESP=$(curl -sS -X POST -H "Content-Type: application/json" \
              -d "${PAYLOAD}" \
              "${BASE}/releases?${AUTH}")
            echo "   API response: $(echo "$RESP" | head -c 300)"
            RELEASE_ID=$(echo "$RESP" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              print(d.get('id', ''))
          except:
              print('')
          " 2>/dev/null || echo "")
            echo "   Created release ID: ${RELEASE_ID}"
          else
            echo "==> Found existing Gitee Release (ID: ${RELEASE_ID})"
          fi

          if [ -n "$RELEASE_ID" ]; then
            echo "==> Uploading artifact to Gitee Release..."
            UPLOAD_RESP=$(curl -sS -X POST \
              -F "file=@${FILE}" \
              "${BASE}/releases/${RELEASE_ID}/attach_files?${AUTH}")
            echo "   Upload response: $(echo "$UPLOAD_RESP" | head -c 300)"
            echo "==> Gitee Release sync complete."
          else
            echo "!! Failed to get or create Gitee Release"
            exit 1
          fi
