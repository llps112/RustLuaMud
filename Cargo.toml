[package]
name = "rust-lua-mud"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1", features = ["full"] }
mlua = { version = "0.10", features = ["luajit", "vendored", "async", "send"] }
crossterm = "0.28"
toml = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = "0.4"
log = "0.4"
env_logger = "0.11"
unicode-width = "0.2"
